<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI提示词助手</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- 顶部工具栏（单行：菜单 + 标题 + 文件夹路径 + 设置 + 窗口控制） -->
  <div id="toolbar" class="toolbar">
    <div class="toolbar-left">
      <button id="toggleSidebarBtn" class="toolbar-btn toggle-btn" title="展开/隐藏左侧任务栏">[|]</button>
      <div class="toolbar-menu">
        <button id="menuFileBtn" class="toolbar-btn">文件</button>
        <div id="menuFileDropdown" class="dropdown-menu" style="display:none;">
          <button id="menuOpenFolder" class="dropdown-item">打开文件夹</button>
          <button id="menuNewWindow" class="dropdown-item">新建窗口</button>
          <div class="dropdown-separator"></div>
          <button id="menuExport" class="dropdown-item dropdown-has-submenu">项目任务导出</button>
          <div id="menuExportSubmenu" class="dropdown-submenu" style="display:none;">
            <button id="menuExportMD" class="dropdown-item">导出为 Markdown</button>
            <button id="menuExportTXT" class="dropdown-item">导出为 文本文件</button>
          </div>
          <div class="dropdown-separator"></div>
          <button id="menuTutorial" class="dropdown-item dropdown-item-disabled">教学（暂未开放）</button>
        </div>
      </div>
      <div class="toolbar-menu">
        <button id="menuLayoutBtn" class="toolbar-btn">布局</button>
        <div id="menuLayoutDropdown" class="dropdown-menu" style="display:none;">
          <button id="menuResetCurrentLayout" class="dropdown-item">当前任务工作台布局恢复默认</button>
          <button id="menuResetAllLayout" class="dropdown-item">全局任务工作台布局恢复默认</button>
        </div>
      </div>
      <h1 id="workspaceTitle" class="toolbar-title">AI提示词助手</h1>
    </div>
    <div class="toolbar-center">
      <span id="folderPath" class="folder-path"></span>
    </div>
    <div class="toolbar-right">
      <div class="toolbar-menu">
        <button id="menuSettingsBtn" class="toolbar-btn">设置</button>
        <div id="menuSettingsDropdown" class="dropdown-menu dropdown-menu-right" style="display:none;">
          <button id="menuTheme" class="dropdown-item dropdown-has-submenu">主题</button>
          <div id="menuThemeSubmenu" class="dropdown-submenu" style="display:none;">
            <button id="menuThemeLight" class="dropdown-item">浅色</button>
            <button id="menuThemeDark" class="dropdown-item">暗色</button>
            <button id="menuThemeDefault" class="dropdown-item">默认</button>
            <button id="menuThemeSystem" class="dropdown-item">跟随系统</button>
          </div>
          <div class="dropdown-separator"></div>
          <button id="menuShortcutSettings" class="dropdown-item">快捷键设置</button>
        </div>
      </div>
      <div class="window-controls">
        <button id="winMinimizeBtn" class="win-ctrl-btn win-minimize-btn" title="最小化">─</button>
        <button id="winMaximizeBtn" class="win-ctrl-btn win-maximize-btn" title="最大化">❐</button>
        <button id="winCloseBtn" class="win-ctrl-btn win-close-btn" title="关闭">✕</button>
      </div>
    </div>
  </div>

  <!-- 主体区域 -->
  <div id="mainContainer" class="main-container">
    <!-- 左侧提示词任务栏 -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-add-label">新建任务</span>
        <button id="addTaskBtn" class="add-task-btn" title="新建提示词任务">+</button>
        <span class="sidebar-add-label">新建任务</span>
      </div>
      <div id="taskList" class="task-list">
        <!-- 任务列表动态生成 -->
      </div>
      <div class="sidebar-footer">
        <span id="taskCount" class="task-count"></span>
      </div>
    </div>

    <!-- 分隔线 -->
    <div id="resizeHandle" class="resize-handle"></div>

    <!-- 右侧内容区域 -->
    <div id="contentArea" class="content-area">
      <!-- 空状态 -->
      <div id="emptyState" class="empty-state">
        <div class="empty-state-content">
          <span class="empty-state-icon">�</span>
          <p class="empty-state-text">请先通过"文件 → 打开文件夹"选择一个工作目录</p>
        </div>
      </div>

      <!-- 提示词工作台 -->
      <div id="workspace" class="workspace" style="display:none;">
        <div id="inputGrid" class="input-grid"></div>
        <div class="output-area">
          <div class="output-header">
            <span class="output-label">完整提示词预览</span>
            <button id="copyBtn" class="copy-btn">复制</button>
          </div>
          <div id="promptBox" class="prompt-box"></div>
        </div>
        <div class="action-buttons">
          <button id="clearBtn" class="clear-btn">清空所有输入</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部状态栏 -->
  <div id="statusBar" class="status-bar">
    <div class="status-bar-left">
      <span id="statusSaveIndicator" class="status-save-indicator" title="保存状态">●</span>
      <span id="statusFolderPath" class="status-item status-folder-path" title="点击复制路径"></span>
    </div>
    <div class="status-bar-right">
      <span id="statusTaskName" class="status-item status-task-name"></span>
      <span class="status-separator">|</span>
      <span id="statusCardName" class="status-item status-card-name"></span>
    </div>
  </div>

  <script src="scripts/stringLoader.js"></script>
  <script src="scripts/fileManager.js"></script>
  <script src="scripts/modal.js"></script>
  <script src="scripts/toolbar.js"></script>
  <script src="scripts/sidebar.js"></script>
  <script src="scripts/content.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
