<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="appTitle">AI提示词助手</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- 顶部工具栏（单行：菜单 + 设置 + 窗口控制） -->
  <div id="toolbar" class="toolbar">
    <div class="toolbar-left">
      <button id="toggleSidebarBtn" class="toolbar-btn toggle-btn" title="展开/隐藏左侧任务栏">[|]</button>
      <div class="toolbar-menu">
        <button id="menuFileBtn" class="toolbar-btn">文件</button>
        <div id="menuFileDropdown" class="dropdown-menu" style="display:none;">
          <button id="menuOpenFolder" class="dropdown-item">打开文件夹</button>
          <button id="menuNewWindow" class="dropdown-item">新建窗口</button>
          <button id="menuCreateProject" class="dropdown-item">新建项目</button>
          <div class="dropdown-separator"></div>
          <button id="menuImportProject" class="dropdown-item">导入项目数据</button>
          <button id="menuExport" class="dropdown-item dropdown-has-submenu">项目任务导出</button>
          <div id="menuExportSubmenu" class="dropdown-submenu" style="display:none;">
            <button id="menuExportMD" class="dropdown-item">导出为 Markdown</button>
            <button id="menuExportTXT" class="dropdown-item">导出为 文本文件</button>
          </div>
          <div class="dropdown-separator"></div>
          <button id="menuTutorial" class="dropdown-item dropdown-item-disabled">教学（暂未开放）</button>
          <div class="dropdown-separator"></div>
          <button id="menuCloseWindow" class="dropdown-item">关闭此窗口</button>
          <button id="menuQuitApp" class="dropdown-item">退出软件</button>
        </div>
      </div>
      <div class="toolbar-menu">
        <button id="menuLayoutBtn" class="toolbar-btn">布局</button>
        <div id="menuLayoutDropdown" class="dropdown-menu" style="display:none;">
          <button id="menuResetCurrentLayout" class="dropdown-item">当前任务工作台布局恢复默认</button>
          <button id="menuResetAllLayout" class="dropdown-item">全局任务工作台布局恢复默认</button>
        </div>
      </div>
    </div>
    <div class="toolbar-right">
      <div class="toolbar-menu">
        <button id="menuSettingsBtn" class="toolbar-btn">设置</button>
        <div id="menuSettingsDropdown" class="dropdown-menu dropdown-menu-right" style="display:none;">
          <button id="menuGlobalSearch" class="dropdown-item">全局搜索</button>
          <button id="menuMoreSettings" class="dropdown-item">更多设置</button>
        </div>
      </div>
      <div class="window-controls">
        <button id="winMinimizeBtn" class="win-ctrl-btn win-minimize-btn" title="最小化">─</button>
        <button id="winMaximizeBtn" class="win-ctrl-btn win-maximize-btn" title="最大化">❐</button>
        <button id="winCloseBtn" class="win-ctrl-btn win-close-btn" title="关闭">✕</button>
      </div>
    </div>
  </div>

  <!-- 主体区域 -->
  <div id="mainContainer" class="main-container">
    <!-- 左侧提示词任务栏 -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-add-label">新建任务</span>
        <button id="addTaskBtn" class="add-task-btn" title="新建提示词任务">+</button>
      </div>
      <div id="taskList" class="task-list">
        <!-- 任务列表动态生成 -->
      </div>
    </div>

    <!-- 分隔线 -->
    <div id="resizeHandle" class="resize-handle"></div>

    <!-- 右侧内容区域 -->
    <div id="contentArea" class="content-area">
      <!-- 空状态 -->
      <div id="emptyState" class="empty-state">
        <div class="empty-state-content">
          <span class="empty-state-icon">�</span>
          <p class="empty-state-text">请先通过"文件 → 打开文件夹"选择一个工作目录</p>
        </div>
      </div>

      <!-- 提示词工作台 -->
      <div id="workspace" class="workspace" style="display:none;">
        <div class="workspace-header">
          <button id="importDataBtn" class="import-data-btn" title="导入卡片数据">导入数据</button>
          <button id="addCustomCardBtn" class="add-custom-card-btn" title="添加自定义卡片">+ 自定义卡片</button>
        </div>
        <div id="inputGrid" class="input-grid"></div>
        <div class="output-area">
          <div class="output-header">
            <span class="output-label">完整提示词预览</span>
            <button id="copyBtn" class="copy-btn">复制</button>
          </div>
          <div id="promptBox" class="prompt-box"></div>
        </div>
        <div class="action-buttons">
          <button id="clearBtn" class="clear-btn">清空所有输入</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部状态栏 -->
  <div id="statusBar" class="status-bar">
    <div class="status-bar-left">
      <span id="statusSaveIndicator" class="status-save-indicator" title="保存状态">●</span>
      <span id="statusFolderPath" class="status-item status-folder-path" title="点击复制路径"></span>
    </div>
    <div class="status-bar-right">
      <span id="statusTaskCount" class="status-item status-task-count"></span>
      <span class="status-separator">|</span>
      <span id="statusTaskName" class="status-item status-task-name"></span>
      <span class="status-separator">|</span>
      <span id="statusCardName" class="status-item status-card-name"></span>
    </div>
  </div>

  <!-- 创建新项目全模态窗口 -->
  <div id="createProjectOverlay" class="create-project-overlay" style="display:none;">
    <div class="create-project-dialog">
      <!-- 头部 -->
      <div class="create-project-header">
        <div class="create-project-header-left">
          <div class="create-project-icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
              <line x1="12" y1="11" x2="12" y2="17"></line>
              <line x1="9" y1="14" x2="15" y2="14"></line>
            </svg>
          </div>
          <div>
            <h2 class="create-project-title" id="createProjectTitle">新建项目</h2>
            <p class="create-project-subtitle" id="createProjectSubtitle">配置项目的基本信息以开始创建</p>
          </div>
        </div>
        <button class="create-project-close-btn" id="createProjectCloseBtn" title="关闭">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- 内容区 -->
      <div class="create-project-body">
        <!-- 父级目录选择 -->
        <div class="create-project-field">
          <label class="create-project-label" for="projectParentDirDisplay">
            <span class="create-project-required-dot"></span>
            <span id="createProjectDirLabel">父级目录</span>
          </label>
          <div class="create-project-dir-row">
            <div class="create-project-dir-input-wrapper">
              <input type="text" class="create-project-dir-input" id="projectParentDirDisplay" readonly
                placeholder="请选择父级目录">
              <span class="create-project-dir-input-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </span>
            </div>
            <button type="button" class="create-project-browse-btn" id="selectParentDirBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="18" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
              </svg>
              <span id="createProjectBrowseLabel">浏览</span>
            </button>
          </div>
          <span class="create-project-hint" id="createProjectDirHint">选择项目存放的父级目录，或点击浏览在目录树中选择</span>
          <span class="create-project-error" id="projectDirError" style="display:none;"></span>
        </div>

        <!-- 项目名称 -->
        <div class="create-project-field">
          <label class="create-project-label" for="projectFolderName">
            <span class="create-project-required-dot"></span>
            <span id="createProjectNameLabel">项目文件夹名称</span>
          </label>
          <input type="text" class="create-project-name-input" id="projectFolderName"
            placeholder="请输入文件夹名称" maxlength="128" autocomplete="off">
          <span class="create-project-hint" id="createProjectNameHint">支持字母、数字、连字符和下划线，长度2-128个字符</span>
          <span class="create-project-error" id="projectNameError" style="display:none;"></span>
        </div>

        <!-- 模板选择 -->
        <div class="create-project-field">
          <label class="create-project-label">
            <span class="create-project-required-dot"></span>
            <span id="createProjectTemplateLabel">选择模板</span>
          </label>
          <div class="create-project-template-cards">
            <!-- 空模板 -->
            <div class="create-project-template-card" data-template="empty" id="templateEmpty">
              <div class="create-project-template-check">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </div>
              <div class="create-project-template-card-header">
                <div class="create-project-template-icon empty">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="21" x2="9" y2="9"></line>
                  </svg>
                </div>
                <div>
                  <div class="create-project-template-card-title" id="templateEmptyTitle">空模板</div>
                </div>
              </div>
              <p class="create-project-template-card-desc" id="templateEmptyDesc">仅包含一张自定义卡片，从零开始构建</p>
            </div>

            <!-- 默认模板（预选） -->
            <div class="create-project-template-card selected" data-template="default" id="templateDefault">
              <div class="create-project-template-check">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
              </div>
              <div class="create-project-template-card-header">
                <div class="create-project-template-icon default">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                </div>
                <div>
                  <div class="create-project-template-card-title" id="templateDefaultTitle">默认模板</div>
                </div>
                <span class="create-project-template-badge" id="templateRecommendedBadge">推荐</span>
              </div>
              <p class="create-project-template-card-desc" id="templateDefaultDesc">包含所有默认提示词卡片，开箱即用</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 底部 -->
      <div class="create-project-footer">
        <button type="button" class="create-project-btn create-project-btn-cancel" id="createProjectCancelBtn">
          <span id="createProjectCancelLabel">取消</span>
        </button>
        <button type="button" class="create-project-btn create-project-btn-primary" id="createProjectOpenHere">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span id="createProjectOpenHereLabel">此窗口打开</span>
        </button>
        <button type="button" class="create-project-btn create-project-btn-secondary" id="createProjectOpenNew">
          <span id="createProjectOpenNewLabel">新窗口打开</span>
        </button>
      </div>
    </div>
  </div>

  <script src="scripts/stringLoader.js"></script>
  <script src="scripts/fileManager.js"></script>
  <script src="scripts/modal.js"></script>
  <script src="scripts/toolbar.js"></script>
  <script src="scripts/sidebar.js"></script>
  <script src="scripts/content.js"></script>
  <script src="scripts/import.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
