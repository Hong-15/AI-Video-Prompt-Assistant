<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景 -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bgGrad)" />
  <!-- H 字母 -->
  <text x="128" y="185" font-family="Arial, sans-serif" font-size="160" font-weight="bold" fill="url(#hGrad)" text-anchor="middle">H</text>
  <!-- 小装饰点 -->
  <circle cx="200" cy="60" r="12" fill="url(#dotGrad)" opacity="0.9" />
  <circle cx="56" cy="200" r="8" fill="url(#dotGrad)" opacity="0.7" />
  <circle cx="180" cy="200" r="6" fill="#fbbf24" opacity="0.5" />
</svg>